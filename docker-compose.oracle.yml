services:
  oracle-db:
    image: container-registry.oracle.com/database/free:latest-lite
    container_name: oci-vision-ai-oracle
    environment:
      ORACLE_PWD: ${OCI_VISION_ORACLE_PASSWORD:-VisionAI2026}
      ORACLE_CHARACTERSET: AL32UTF8
    ports:
      - "${OCI_VISION_ORACLE_PORT:-1524}:1521"
    volumes:
      - oracle-data:/opt/oracle/oradata
    healthcheck:
      test:
        [
          "CMD",
          "sqlplus",
          "-L",
          "sys/${OCI_VISION_ORACLE_PASSWORD:-VisionAI2026}@//localhost:1521/FREEPDB1 as sysdba",
          "@/dev/null"
        ]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 120s
    restart: unless-stopped

volumes:
  oracle-data:
