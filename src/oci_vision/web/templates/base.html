<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}OCI Vision Studio{% endblock %}</title>
    <link rel="stylesheet" href="/static/styles.css">
    <script src="/static/htmx-2.0.0.min.js"></script>
    {% block head_extra %}{% endblock %}
</head>
<body class="h-full min-h-screen font-sans antialiased">
    <!-- Navigation -->
    <nav class="glass-card mb-6 mx-4 mt-4 px-6 py-4 flex items-center justify-between">
        <a href="/" class="flex items-center gap-3 text-xl font-bold cyan-accent hover:text-cyan-300 transition">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
            </svg>
            OCI Vision Studio
        </a>
        <div class="flex items-center gap-6">
            <a href="/" class="text-slate-300 hover:text-cyan-400 transition font-medium">Analyzer</a>
            <a href="/gallery" class="text-slate-300 hover:text-cyan-400 transition font-medium">Gallery</a>
            <a href="/compare" class="text-slate-300 hover:text-cyan-400 transition font-medium">Compare</a>
            <a href="/showcase" class="text-slate-300 hover:text-cyan-400 transition font-medium">Showcase</a>
        </div>
    </nav>

    <!-- Main content -->
    <main class="mx-4 mb-8">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="text-center text-slate-500 text-sm pb-6">
        OCI Vision Studio &mdash; Powered by Oracle Cloud Vision AI
    </footer>

    <script src="/static/app.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
